name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    name: verify · build · publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload artifacts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # git-cliff needs the full history to segment by tag
          persist-credentials: false

      # Cache explicitly off (setup-uv enables it by default): release
      # artifacts must never be built from cache-poisonable state.
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false

      - name: Install (locked)
        run: uv sync --locked

      - name: Tag must match the package version
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          pkg="v$(uv run python -c 'import moodengine; print(moodengine.__version__)')"
          if [ "$pkg" != "$TAG" ]; then
            echo "::error::tag $TAG does not match package version $pkg"
            exit 1
          fi

      - name: Tests
        run: uv run pytest

      - name: Build sdist + wheel
        run: uv build

      - name: Generate release notes (conventional commits since previous tag)
        run: uvx git-cliff --latest --strip header -o RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: >
          gh release create "$TAG" dist/*
          --title "$TAG"
          --notes-file RELEASE_NOTES.md
