name: Release Please

# Automated releases from conventional commits: release-please keeps a "release
# PR" up to date (version bump + CHANGELOG). Merging that PR cuts the tag and the
# GitHub release. release-please authenticates with a GitHub App installation token
# minted per run: a distinct identity that can open PRs even when the org forbids the
# default Actions token from doing so, and whose commits/PRs carry the App bot's
# noreply address (no maintainer email leaks). Build + upload of artifacts run in the
# same job graph, gated on a release actually being cut.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: maintain release PR / cut release
    runs-on: ubuntu-latest
    # The GITHUB_TOKEN stays read-only; the App installation token below carries the
    # contents / pull-requests / issues write scopes release-please actually uses.
    permissions:
      contents: read
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Mint a GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          # Scope the minted token to exactly what release-please touches, not the
          # App's full installation grant: version-bump commit + tag + release
          # (contents), the release PR (pull-requests), and its labels (issues).
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-artifacts:
    name: build + attach sdist/wheel
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload assets to the freshly created release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      # Cache explicitly off (setup-uv enables it by default): release artifacts
      # must never be built from cache-poisonable state.
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false

      - name: Install (locked)
        run: uv sync --locked

      - name: Tag must match the package version
        shell: bash
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          pkg="v$(uv run python -c 'import moodengine; print(moodengine.__version__)')"
          if [ "$pkg" != "$TAG" ]; then
            echo "::error::tag $TAG does not match package version $pkg"
            exit 1
          fi

      - name: Tests
        run: uv run pytest

      - name: Build sdist + wheel
        run: uv build

      - name: Attach artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" dist/*
