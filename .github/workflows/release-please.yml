name: Release Please

# Automated releases from conventional commits: release-please keeps a "release
# PR" up to date (version bump + CHANGELOG). Merging that PR cuts the tag and the
# GitHub release. Because release-please creates the tag with GITHUB_TOKEN — which
# does NOT trigger tag-based workflows — the build+upload of artifacts runs here in
# the same run, gated on a release actually being cut.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: maintain release PR / cut release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag + GitHub release
      pull-requests: write # open/update the release PR
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-artifacts:
    name: build + attach sdist/wheel
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload assets to the freshly created release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      # Cache explicitly off (setup-uv enables it by default): release artifacts
      # must never be built from cache-poisonable state.
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false

      - name: Install (locked)
        run: uv sync --locked

      - name: Tag must match the package version
        shell: bash
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          pkg="v$(uv run python -c 'import moodengine; print(moodengine.__version__)')"
          if [ "$pkg" != "$TAG" ]; then
            echo "::error::tag $TAG does not match package version $pkg"
            exit 1
          fi

      - name: Tests
        run: uv run pytest

      - name: Build sdist + wheel
        run: uv build

      - name: Attach artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" dist/*
