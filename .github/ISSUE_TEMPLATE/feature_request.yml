name: Feature request
description: Suggest a capability or improvement for the engine.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that moodengine makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the API or behavior look like? Sketch a signature if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or other designs you weighed.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This belongs in the pure, stateless core (not app/UI concerns, which live downstream)
        - label: I've checked it isn't already possible with the current API
